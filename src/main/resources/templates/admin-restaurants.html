<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Restaurants</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="admin-bg">
 
<div class="section admin-restaurants-page">

  <!-- Header -->
  <div class="admin-page-head">
    <div>
      <div class="admin-breadcrumb">
        <a th:href="@{/admin/dashboard}">Admin</a>
        <span> / </span>
        <span>Restaurants</span>
      </div>

      <h2 style="margin-top:6px;">Restaurants (Admin)</h2>
      <div class="muted">
        Total: <b th:text="${#lists.size(restaurants)}">0</b>
      </div>
    </div>

    <div class="admin-head-actions">
      <a class="btn btn-outline" th:href="@{/admin/dashboard}">Back</a>
      <a class="btn btn-solid" th:href="@{/admin/restaurants/new}">+ Add Restaurant</a>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="admin-toolbar">
    <div class="searchbox">
      <input id="rSearch" type="text" placeholder="Search by restaurant / city / area..." />
      <div class="muted" style="margin-top:6px;">Example: “nashik”, “college road”, “fogcity”</div>
    </div>

    <div class="admin-chips">
      <div class="chipX">
        <div class="muted">Active</div>
        <div class="chipX-val" id="activeCount">0</div>
      </div>
      <div class="chipX">
        <div class="muted">Inactive</div>
        <div class="chipX-val" id="inactiveCount">0</div>
      </div>
    </div>
  </div>

  <!-- Card List -->
  <div class="rList">
    <div class="muted" th:if="${#lists.isEmpty(restaurants)}" style="padding:14px;">
      No restaurants added yet.
    </div>

    <div class="rCard"
         th:each="r : ${restaurants}"
         th:attr="data-name=${r.name},data-city=${r.city},data-area=${r.area},data-active=${r.active}"
         th:with="
           rImg=${(r.imageUrl != null and !#strings.isEmpty(r.imageUrl))
                ? (#strings.startsWith(r.imageUrl,'/') ? r.imageUrl : '/' + r.imageUrl)
                : '/images/default-restaurant.jpg'}
         ">

      <div class="rLeft">
        <img class="rThumb" th:src="${rImg}" alt="Restaurant">

        <div class="rMeta">
          <div class="rName" th:text="${r.name}">Restaurant Name</div>
          <div class="muted">
            ID: <b th:text="${r.id}">0</b>
            <span th:if="${r.address != null and !#strings.isEmpty(r.address)}"
                  th:text="' • ' + ${r.address}"> • Address</span>
          </div>

          <div class="rLoc">
            <span class="locTag" th:text="${r.city}">City</span>
            <span class="locDot">•</span>
            <span class="muted" th:text="${(r.area != null and !#strings.isEmpty(r.area)) ? r.area : '-'}">Area</span>
          </div>
        </div>
      </div>

      <div class="rRight">
        <span class="statusPill"
              th:classappend="${r.active ? ' on' : ' off'}"
              th:text="${r.active ? 'ACTIVE' : 'INACTIVE'}">ACTIVE</span>

        <div class="rActions">
          <a class="btn btn-outline btn-sm"
             th:href="@{/admin/restaurants/edit/{id}(id=${r.id})}">Edit</a>

          <!-- Correct URL for your AdminFoodItemController -->
          <a class="btn btn-outline btn-sm"
             th:href="@{/admin/food-items/{restaurantId}(restaurantId=${r.id})}">
            Manage Food
          </a>

          <form th:action="@{/admin/restaurants/{id}/toggle(id=${r.id})}"
                method="post" style="display:inline;">
            <button class="btn btn-outline btn-sm" type="submit"
                    th:text="${r.active ? 'Deactivate' : 'Activate'}">Toggle</button>
          </form>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
  // Search + active/inactive count (client-side)
  (function(){
    const input = document.getElementById('rSearch');
    const cards = Array.from(document.querySelectorAll('.rCard'));

    function updateCounts(){
      let a=0, b=0;
      cards.forEach(c=>{
        if (c.style.display === 'none') return;
        const active = (c.dataset.active === 'true');
        if(active) a++; else b++;
      });
      document.getElementById('activeCount').innerText = a;
      document.getElementById('inactiveCount').innerText = b;
    }

    function filter(){
      const q = (input.value || '').toLowerCase().trim();
      cards.forEach(c=>{
        const text = `${c.dataset.name} ${c.dataset.city} ${c.dataset.area}`.toLowerCase();
        c.style.display = text.includes(q) ? '' : 'none';
      });
      updateCounts();
    }

    updateCounts();
    input.addEventListener('input', filter);
  })();
</script>

</body>
</html>
