<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Tracking</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">

  <!-- Leaflet CSS -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
</head>
<body>

  <!-- Common Navbar -->
  <div th:replace="~{fragments/navbar :: appNavbar}"></div>

  <div class="section">
    <div class="actions" style="margin-bottom:12px;">
      <a class="btn btn-outline" th:href="@{/orders/{id}(id=${orderId})}">Back to Order</a>
    </div>

    <h2>Live Order Tracking</h2>
    <p class="muted">Order ID: <b th:text="${orderId}">0</b></p>

    <div class="track-layout">
      <div class="panel">
        <h3>Status</h3>
        <p class="muted">Current: <b id="statusText" th:text="${orderStatus}">OUT_FOR_DELIVERY</b></p>
        <p class="muted" id="lastUpdateText">Last update: -</p>

        <hr class="hr">

        <h3>Delivery Boy</h3>
        <div class="muted">Name: <b id="agentName">-</b></div>
        <div class="muted">Phone: <b id="agentPhone">-</b></div>
        <div class="muted">Vehicle: <b id="vehicleNo">-</b></div>

        <hr class="hr">

        <div class="muted">Map updates every 5 seconds.</div>
      </div>

      <div class="panel">
        <h3>Map</h3>
        <div id="map" class="map-box"></div>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin="">
  </script>

  <script th:inline="javascript">
    /*<![CDATA[*/
    const orderId = /*[[${orderId}]]*/ 0;
    const orderCity = /*[[${orderCity}]]*/ "";
    /*]]>*/
  </script>

  <script>
    function cityCenter(city){
      const c = (city || "").toLowerCase();
      if (c.includes("chennai")) return [13.0827, 80.2707];
      if (c.includes("hyderabad")) return [17.3850, 78.4867];
      if (c.includes("mumbai")) return [19.0760, 72.8777];
      if (c.includes("nashik")) return [19.9975, 73.7898];
      if (c.includes("delhi")) return [28.6139, 77.2090];
      if (c.includes("bangalore")) return [12.9716, 77.5946];
      return [17.3850, 78.4867]; // fallback
    }

    const start = cityCenter(orderCity);

    // init map
    const map = L.map('map').setView(start, 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // marker
    let marker = L.marker(start).addTo(map).bindPopup("Delivery Boy");
    let firstFix = false;
    let timer = null;

    async function loadTracking(){
      try{
        const res = await fetch(`/api/track/${orderId}`, { cache: "no-store" });
        const data = await res.json();

        // status
        if(data.status){
          document.getElementById("statusText").innerText = data.status;
        }

        // agent
        document.getElementById("agentName").innerText = data.agentName || "-";
        document.getElementById("agentPhone").innerText = data.agentPhone || "-";
        document.getElementById("vehicleNo").innerText = data.vehicleNo || "-";

        // last update
        document.getElementById("lastUpdateText").innerText =
          "Last update: " + (data.lastUpdated ? data.lastUpdated : "-");

        // location
        if(data.lat != null && data.lng != null){
          marker.setLatLng([data.lat, data.lng]);

          if(!firstFix){
            map.setView([data.lat, data.lng], 15);
            firstFix = true;
          }
        }

        // stop polling if delivered/cancelled
        if(data.status === "DELIVERED" || data.status === "CANCELLED"){
          if(timer) clearInterval(timer);
        }

      } catch(e){
        console.log("Tracking error:", e);
      }
    }

    loadTracking();
    timer = setInterval(loadTracking, 5000);
  </script>

</body>
</html>
