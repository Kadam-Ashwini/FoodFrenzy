<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="'Category - ' + ${category}">Category</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header class="navbar">
  <div class="logo">
    <img th:src="@{/images/logo.png}" alt="Logo">
    <span>FoodFrenzy</span>
  </div>
  <div class="nav-actions">
    <a class="btn btn-outline" th:href="@{/}">Home</a>
  </div>
</header>

<div class="section">
  <h2 th:text="'Category: ' + ${category}">Category</h2>
  <p class="muted" th:if="${msg}" th:text="${msg}"></p>

  <div class="muted" th:if="${#lists.isEmpty(foods)}" style="margin-top:8px;">
    No items found in this category.
  </div>

  <div class="grid" th:if="${!#lists.isEmpty(foods)}">
    <a class="card-link" th:each="f : ${foods}" th:href="@{/restaurants/{id}(id=${f.restaurant.id})}">
      <div class="card">
        <img class="card-img"
             th:src="${(f.imageUrl != null and !#strings.isEmpty(f.imageUrl)) ? f.imageUrl : '/images/default-food.jpg'}"
             alt="Food">
        <div class="card-body">
          <h3 th:text="${f.name}">Food</h3>
          <p class="muted" th:text="${f.category}">Category</p>
          <p class="muted" th:text="'Restaurant: ' + ${f.restaurant.name}">Restaurant</p>
          <p style="margin-top:6px;">₹<b th:text="${f.price}">0</b></p>
        </div>
      </div>
    </a>
  </div>
</div>

</body>
</html>
